<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 p5.js 전시관</title>

<style>
body{
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #f7f9fc, #dfe6f3);
  text-align: center;
  padding: 40px 20px;
}

/* 🖼️ 제목 (전시회 느낌) */
h1{
  font-size: 30px;
  letter-spacing: 3px;
  color: #222;
  margin-bottom: 10px;
}

h1::after{
  content:"";
  display:block;
  width:140px;
  height:3px;
  background:#4a90e2;
  margin:10px auto 30px;
  border-radius:2px;
}

/* 🎨 갤러리 2x2 */
#projects{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
  max-width: 900px;
  margin: auto;
  padding: 10px;
}

/* 🧊 전시 작품 카드 */
.cell{
  height: 300px;
  background: white;
  border-radius: 16px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  overflow: hidden;

  /* ✨ 등장 애니메이션 */
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.8s forwards;
}

/* 카드 순차 등장 */
.cell:nth-child(1){ animation-delay: 0.1s; }
.cell:nth-child(2){ animation-delay: 0.2s; }
.cell:nth-child(3){ animation-delay: 0.3s; }
.cell:nth-child(4){ animation-delay: 0.4s; }

/* hover = 전시 작품 강조 */
.cell{
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.cell:hover{
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 45px rgba(0,0,0,0.2);
}

/* iframe */
iframe{
  width: 100%;
  height: 100%;
  border: none;
}

/* ✨ 등장 효과 */
@keyframes fadeIn{
  to{
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>🎨 나의 p5.js 전시관</h1>

<div id="projects">

  <div class="cell">
    <iframe src="p5js/과제1/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제4/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제2/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제3/index.html"></iframe>
  </div>

</div>

</body>
</html>
