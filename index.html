<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p5.js 작품 모음</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 24px;

  background: radial-gradient(circle at top, #ffffff, #dfe7f3);
  font-family: sans-serif;
}

h1 {
  margin-bottom: 25px;
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: #222;
  position: relative;
}

h1::after {
  content: "";
  display: block;
  width: 120px;
  height: 3px;
  background: #4a90e2;
  margin: 10px auto 0;
  border-radius: 2px;
}

/* 📦 2x2 구조 (절대 유지) */
#projects {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 100%;
  max-width: 600px;
  gap: 16px;
}

/* 🧊 카드 */
#projects .cell {
  aspect-ratio: 16 / 9;
  position: relative;
  overflow: hidden;

  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.08);

  box-shadow: 0 8px 20px rgba(0,0,0,0.12);

  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.6s forwards;
}

/* 순차 등장 */
.cell:nth-child(1){ animation-delay: 0.1s; }
.cell:nth-child(2){ animation-delay: 0.2s; }
.cell:nth-child(3){ animation-delay: 0.3s; }
.cell:nth-child(4){ animation-delay: 0.4s; }

#projects .cell:hover {
  transform: translateY(-6px) scale(1.02);
  transition: 0.25s ease;
  box-shadow: 0 18px 35px rgba(0,0,0,0.2);
}

/* 🖥 iframe (네 경로 반영) */
#projects .cell iframe {
  position: absolute;
  top: 0;
  left: 0;

  width: 600px;
  height: 400px;

  border: none;
  transform-origin: top left;
  transform: scale(0.5);
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>🎨 나의 p5.js 작품 전시</h1>

<main id="projects">

  <div class="cell">
    <iframe src="p5js/과제1/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제4/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제2/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="p5js/과제3/index.html"></iframe>
  </div>

</main>

</body>
</html>
